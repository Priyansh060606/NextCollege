{% extends 'base.html' %}

{% block title %}Register — IntelliCounsel AI{% endblock %}

{% block content %}
<div class="flex justify-center items-center min-h-[70vh]">
    <div class="w-full max-w-md">
        <div class="bg-white border border-outline-variant paper-shadow rounded-2xl p-10">
            <div class="text-center mb-8">
                <div class="w-12 h-12 bg-primary rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <span class="material-symbols-outlined text-white text-[28px]">person_add</span>
                </div>
                <h3 class="font-headline-md text-headline-md text-primary">Create Account</h3>
                <p class="text-on-surface-variant text-[15px] mt-1">Join IntelliCounsel AI for free</p>
            </div>
            
            <form method="POST">
                {% csrf_token %}
                <div class="mb-5">
                    <label class="font-label-mono text-[15px] text-on-surface-variant uppercase tracking-widest block mb-2">Full Name</label>
                    <input type="text" name="name" required placeholder="Your name"
                        class="w-full bg-surface-container-low border border-outline-variant text-on-surface rounded-2xl p-3 text-[15px] focus:ring-1 focus:ring-secondary focus:border-secondary">
                </div>
                <div class="mb-5">
                    <label class="font-label-mono text-[15px] text-on-surface-variant uppercase tracking-widest block mb-2">Email Address</label>
                    <input type="email" name="email" required placeholder="you@example.com"
                        class="w-full bg-surface-container-low border border-outline-variant text-on-surface rounded-2xl p-3 text-[15px] focus:ring-1 focus:ring-secondary focus:border-secondary">
                </div>
                <div class="mb-8">
                    <label class="font-label-mono text-[15px] text-on-surface-variant uppercase tracking-widest block mb-2">Password</label>
                    <input type="password" name="password" required placeholder="Create a strong password"
                        class="w-full bg-surface-container-low border border-outline-variant text-on-surface rounded-2xl p-3 text-[15px] focus:ring-1 focus:ring-secondary focus:border-secondary">
                </div>
                
                <button type="submit" class="w-full bg-primary text-on-primary font-bold py-4 rounded-2xl hover:opacity-90 transition-opacity">
                    Create Account
                </button>
            </form>
            
            <div class="text-center mt-6 pt-6 border-t border-outline-variant">
                <span class="text-on-surface-variant text-[15px]">Already have an account?</span>
                <a href="{% url 'login' %}" class="text-secondary font-bold hover:underline ml-1 text-[15px]">Login</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
